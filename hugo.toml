baseURL = "https://wrqkkk.github.io/"
languageCode = "zh-cn"
title = "wrqkkk's Notes"
theme = "PaperMod"

[pagination]
  pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true

# Keep public post URLs stable when source files move between lifecycle folders.
[permalinks]
  [permalinks.page]
    posts = '/posts/:slugorcontentbasename/'

# Site outputs: HTML + RSS + the JSON index used by PaperMod search.
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "Notes on math / stats / ML"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = true

  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false

  [params.profileMode]
    enabled = true
    title = "Rockkie Wang"
    subtitle = "Undergraduate student in Applied Mathematics at SUFE."
    imageUrl = "/images/avatar.jpg"
    imageTitle = "Rockkie Wang"
    imageWidth = 140
    imageHeight = 160

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/wrqkkk"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  name = "Updates"
  url = "/updates/"
  weight = 15

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 20

[[menu.main]]
  name = "CV"
  url = "/cv/"
  weight = 25

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 30

[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 40
