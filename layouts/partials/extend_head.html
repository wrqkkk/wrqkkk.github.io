{{ if or .Params.math .Site.Params.math }}
<!-- 使用 KaTeX 的 CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsRQf1N1X0wS0mRj1QzQJ7I1m7xRz2bH1w/A7xP2w0B//sLzQ+qR0Fj2X1" crossorigin="anonymous">

<!-- 使用 KaTeX 的核心库 -->
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>

<!-- 由于 Hugo 的 passthrough 会原生渲染出具有类名 math 的 span/div，我们只需要加一小段触发脚本 -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const mathElements = document.querySelectorAll('.math');
    mathElements.forEach(function(el) {
      katex.render(el.textContent, el, {
        displayMode: el.tagName === 'DIV',
        throwOnError: false
      });
    });
  });
</script>
{{ end }}
